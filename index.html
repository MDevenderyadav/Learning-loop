<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleAI - Fashion Recommendation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: #6c5ce7; margin: 0; font-size: 2.5rem; }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background-color: #6c5ce7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-primary:hover { background-color: #5849be; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👗 StyleAI</h1>
            <p>Your Personal Fashion Assistant</p>
        </header>

        <div class="card">
            <h2>Tell us about yourself</h2>
            <form action="/recommend" method="POST">

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Current Weather</label>
                    <select name="weather" required>
                        <option value="hot">Hot &amp; Sunny</option>
                        <option value="cold">Cold &amp; Snowy</option>
                        <option value="rain">Rainy</option>
                        <option value="mild">Mild / Pleasant</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Skin Tone</label>
                    <!-- ✅ name="skin_tone" matches request.form.get('skin_tone') in app.py -->
                    <select name="skin_tone" required>
                        <option value="fair">Fair</option>
                        <option value="medium">Medium</option>
                        <option value="olive">Olive</option>
                        <option value="dark">Dark</option>
                        <option value="warm">Warm Undertones</option>
                        <option value="cool">Cool Undertones</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Body Shape</label>
                    <select name="body_shape" required>
                        <option value="hourglass">Hourglass</option>
                        <option value="pear">Pear</option>
                        <option value="apple">Apple</option>
                        <option value="rectangle">Rectangle</option>
                        <option value="inverted_triangle">Inverted Triangle</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Occasion</label>
                    <select name="occasion" required>
                        <option value="casual">Casual / Daily Wear</option>
                        <option value="gym">Gym / Workout</option>
                        <option value="office">Office / Work</option>
                        <option value="formal">Formal Event</option>
                        <option value="date">Date Night</option>
                        <option value="wedding">Wedding</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">✨ Generate Outfit</button>
            </form>
        </div>
    </div>
</body>
</html>
